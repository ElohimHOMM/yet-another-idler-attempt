<!-- Settings Modal -->
<div id="settings-modal" class="fixed inset-0 z-50 flex hidden items-center justify-center bg-transparent">
  <div class="relative w-xl rounded-2xl bg-neutral-900 p-8 text-center shadow-2xl">
  <h2 class="mb-4 text-xl font-bold">Settings</h2>
  <div class="mb-6">
    <label for="notation-select" class="block text-left text-neutral-300 mb-2">
    Number Notation
    </label>
    <select id="notation-select" class="w-full rounded-lg bg-neutral-800 px-3 py-2 text-white">
    <option value="short">Short (M,B,T...)</option>
    <option value="scientific">Scientific (1.23e6)</option>
    <option value="engineering">Engineering (1.23M, 1.23k...)</option>
    </select>
  </div>
  <div class="mb-6">
    <label for="volume-slider" class="block text-left text-neutral-300 mb-2">
    Volume (There's no sounds yet, ignore this slider)
    </label>
    <input type="range" id="volume-slider" min="0" max="100" class="w-full h-2 bg-neutral-800 rounded-lg appearance-none accent-neutral-400">
  </div>
  <h4 class="mb-4 text-l text-red font-bold">Danger Zone</h3>
  <div class="columns-2 gap-1 mb-6">
    <button id="delete-save" class="rounded-xl bg-red-600 mb-2 px-6 py-2 font-semibold hover:bg-red-500">
    Delete Save
    </button>
    <button id="export-save" class="rounded-xl bg-sky-600 mb-2 px-6 py-2 font-semibold hover:bg-sky-500">
    Export Save
    </button>
    <button id="manual-save" class="rounded-xl bg-emerald-600 mb-2 px-6 py-2 font-semibold hover:bg-emerald-500">
    Manual Save
    </button>
    <button id="import-save" class="rounded-xl bg-sky-600 mb-2 px-6 py-2 font-semibold hover:bg-sky-500">
    Import Save
    </button>
  </div>
  <button id="settings-ok" data-close-modal class="rounded-xl bg-neutral-600 px-6 py-2 font-semibold hover:bg-neutral-500">
      OK
  </button>
  </div>
</div>
