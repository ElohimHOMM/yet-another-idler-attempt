<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <title>YAIA WIP</title>
</head>
<body class="flex flex-col h-screen text-white bg-neutral-900 font-mono">
  <!-- Main Layout -->
  <main>
    <div class="flex h-screen bg-neutral-900 text-white">
      <!-- Left Sidebar -->
      <aside class="w-56 p-4 bg-neutral-900 flex flex-col space-y-4">
        <div class="bg-neutral-700 rounded-xl p-4 shadow-md">
          <h3 class="font-bold">Divinity</h3>
          <p id="points" class="text-xl mt-2">0</p>
        </div>
        <div class="bg-neutral-700 rounded-xl p-4 shadow-md">
          <h3 class="font-bold">Placeholder</h3>
          <p id="next-points" class="text-xl mt-2">0</p>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 flex flex-col">
        <!-- Tabs Row -->
        <div class="bg-neutral-900 rounded-t-xl justify-between flex space-x-2">
          <div class="flex">
            <button data-tab="main" class="tab-button px-4 py-2 rounded-t-lg font-semibold hover:bg-neutral-600">
              Main
            </button>
            <button data-tab="shop" class="tab-button px-4 py-2 rounded-t-lg font-semibold hover:bg-neutral-600">
              Shop
            </button>
            <button data-tab="story" class="tab-button px-4 py-2 rounded-t-lg font-semibold hover:bg-neutral-600">
              Story
            </button>
            <button data-tab="next" class="tab-button px-4 py-2 rounded-t-lg font-semibold hover:bg-neutral-600">
              Next Currency
            </button>
          </div>

          <div class="flex">
            <button id="info-button" class="p-2 rounded-lg hover:bg-neutral-600">
              <img src="/assets/info-svgrepo-com.svg" class="w-6 h-6" alt="Info"/>
            </button>

            <button id="settings-button" class="p-2 rounded-lg hover:bg-neutral-600">
              <img src="/assets/gear-svgrepo-com.svg" class="w-6 h-6" alt="Settings"/>
            </button>
          </div>
        </div>

        <!-- Tab Panels -->
         <!-- Main -->
        <div class="tab-panels flex-1 bg-neutral-800 p-6 mt-0">
          <div id="main" class="tab-panel">
            <button id="manual-click" class="bg-neutral-600 px-6 py-2 rounded-xl font-semibold hover:bg-neutral-500 relative overflow-hidden">
              <span class="relative z-10">Gain Divinity</span>

              <div class="progress-bar absolute left-0 top-0 h-full w-0 bg-indigo-400 opacity-50"></div>
            </button>
          </div>

          <!-- Shop -->
          <div id="shop" class="tab-panel hidden">
            <div class="bg-neutral-700 rounded-xl p-4 shadow-md w-64">
              <h3 class="font-bold mb-2">Faster Gathering</h3>
              <p class="text-sm text-neutral-300 mb-4">
                Reduce action time from 5s → 4s
              </p>
              <button id="buy-speed" class="bg-indigo-600 px-4 py-2 rounded-xl font-semibold hover:bg-indigo-500 disabled:bg-neutral-500">
                Buy (5 Divinity)
              </button>
            </div>
          </div>

          <!-- Story-->
          <div id="story" class="tab-panel hidden h-full flex gap-4">
            <!-- Left: Entry List -->
            <div id="story-list" class="w-1/3 bg-neutral-700 rounded-xl p-4 overflow-y-auto">
              <!-- Entries will be injected -->
            </div>
            <!-- Right: Content -->
            <div id="story-content" class="flex-1 bg-neutral-800 rounded-xl p-6 overflow-y-auto">
              <h2 id="story-title" class="text-xl font-bold mb-4">No entry selected</h2>
              <p id="story-text" class="text-neutral-300 whitespace-pre-line">
                Select a story entry to read.
              </p>
            </div>
          </div>

          <div id="next" class="tab-panel hidden">
            <p>Next currency content</p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="modal-root">

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
